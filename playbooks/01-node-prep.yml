---
# Phase 1: 全ノード共通の OS / ランタイム準備
- name: Phase 1 - node preparation (containerd / kubeadm)
  hosts: k8s_cluster
  become: true
  gather_facts: true
  vars:
    apt_lock_timeout: 300

  tasks:
    # --- 1-0 ジャンボフレーム（netplan drop-in で NIC MTU を恒久化） ---
    - name: Persist jumbo MTU via netplan drop-in
      ansible.builtin.copy:
        dest: /etc/netplan/99-mtu.yaml
        content: |
          network:
            version: 2
            ethernets:
              {{ node_nic }}:
                mtu: {{ node_mtu }}
        owner: root
        group: root
        mode: "0600"
      register: mtu_dropin

    - name: Apply netplan when MTU drop-in changed
      ansible.builtin.command: netplan apply
      when: mtu_dropin.changed

    # --- 1-1 カーネルモジュール ---
    - name: Load kernel modules now (overlay/br_netfilter/vxlan)
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter
        - vxlan

    - name: Persist kernel modules across reboot
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k8s.conf
        content: "overlay\nbr_netfilter\nvxlan\n"
        owner: root
        group: root
        mode: "0644"

    # --- 1-1 sysctl ---
    - name: Set required sysctl params
      ansible.posix.sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        sysctl_file: /etc/sysctl.d/k8s.conf
        sysctl_set: true
        reload: true
      loop:
        - { name: net.bridge.bridge-nf-call-iptables, value: "1" }
        - { name: net.bridge.bridge-nf-call-ip6tables, value: "1" }
        - { name: net.ipv4.ip_forward, value: "1" }

    # --- 1-2 swap 無効化 ---
    - name: Disable swap now
      ansible.builtin.command: swapoff -a
      changed_when: false

    - name: Comment swap entries in /etc/fstab
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^(\s*[^#\n]+\s+swap\s+.*)$'
        replace: '# \1'

    # --- 依存パッケージ ---
    - name: Install base packages
      ansible.builtin.apt:
        name:
          - jq
          - apt-transport-https
          - ca-certificates
          - curl
          - gpg
        update_cache: true
        lock_timeout: "{{ apt_lock_timeout }}"

    # --- 1-3 containerd（バイナリ） ---
    - name: Download and extract containerd {{ containerd_version }}
      ansible.builtin.unarchive:
        src: "https://github.com/containerd/containerd/releases/download/v{{ containerd_version }}/containerd-{{ containerd_version }}-linux-amd64.tar.gz"
        dest: /usr/local
        remote_src: true
        creates: /usr/local/bin/containerd

    - name: Install containerd systemd unit
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/containerd/containerd/main/containerd.service
        dest: /etc/systemd/system/containerd.service
        mode: "0644"

    - name: Get latest runc release tag
      ansible.builtin.uri:
        url: https://api.github.com/repos/opencontainers/runc/releases/latest
        return_content: true
      register: runc_rel
      delegate_to: localhost
      become: false
      run_once: true

    - name: Install runc binary
      ansible.builtin.get_url:
        url: "https://github.com/opencontainers/runc/releases/download/{{ runc_rel.json.tag_name }}/runc.amd64"
        dest: /usr/local/sbin/runc
        mode: "0755"

    - name: Get latest CNI plugins release tag
      ansible.builtin.uri:
        url: https://api.github.com/repos/containernetworking/plugins/releases/latest
        return_content: true
      register: cni_rel
      delegate_to: localhost
      become: false
      run_once: true

    - name: Create CNI bin dir
      ansible.builtin.file:
        path: /opt/cni/bin
        state: directory
        mode: "0755"

    - name: Download and extract CNI plugins
      ansible.builtin.unarchive:
        src: "https://github.com/containernetworking/plugins/releases/download/{{ cni_rel.json.tag_name }}/cni-plugins-linux-amd64-{{ cni_rel.json.tag_name }}.tgz"
        dest: /opt/cni/bin
        remote_src: true
        creates: /opt/cni/bin/bridge

    # --- 1-4 containerd 設定（SystemdCgroup=true） ---
    - name: Ensure /etc/containerd exists
      ansible.builtin.file:
        path: /etc/containerd
        state: directory
        mode: "0755"

    - name: Generate default containerd config
      ansible.builtin.command: containerd config default
      register: ctd_default
      changed_when: false

    - name: Write containerd config with SystemdCgroup=true
      ansible.builtin.copy:
        dest: /etc/containerd/config.toml
        content: "{{ ctd_default.stdout | regex_replace('SystemdCgroup = false', 'SystemdCgroup = true') }}\n"
        mode: "0644"
      notify: restart containerd

    - name: Enable and (re)start containerd
      ansible.builtin.systemd_service:
        name: containerd
        enabled: true
        state: started
        daemon_reload: true

    # --- 1-5 kubeadm/kubelet/kubectl ---
    - name: Ensure keyrings dir
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Kubernetes apt key
      ansible.builtin.get_url:
        url: "https://pkgs.k8s.io/core:/stable:/{{ k8s_minor }}/deb/Release.key"
        dest: /tmp/k8s-release.key
        mode: "0644"

    - name: Dearmor Kubernetes apt key
      ansible.builtin.command:
        cmd: gpg --batch --yes --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg /tmp/k8s-release.key
        creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

    - name: Add Kubernetes apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/{{ k8s_minor }}/deb/ /"
        filename: kubernetes
        state: present
        update_cache: true

    - name: Unhold kube packages (allow version change)
      ansible.builtin.dpkg_selections:
        name: "{{ item }}"
        selection: install
      loop: [kubelet, kubeadm, kubectl]
      failed_when: false

    - name: Install kubelet/kubeadm/kubectl {{ k8s_version }}
      ansible.builtin.apt:
        name:
          - "kubelet={{ k8s_version }}-*"
          - "kubeadm={{ k8s_version }}-*"
          - "kubectl={{ k8s_version }}-*"
        state: present
        allow_change_held_packages: true
        update_cache: true
        lock_timeout: "{{ apt_lock_timeout }}"

    - name: Hold kube packages
      ansible.builtin.dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop: [kubelet, kubeadm, kubectl]

    - name: Enable kubelet
      ansible.builtin.systemd_service:
        name: kubelet
        enabled: true
        state: started

  handlers:
    - name: restart containerd
      ansible.builtin.systemd_service:
        name: containerd
        state: restarted
        daemon_reload: true
