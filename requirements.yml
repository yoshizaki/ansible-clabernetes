# 追加で必要な Ansible collection（pip 版 ansible には同梱だが再現用に明示）
#   インストール: ansible-galaxy collection install -r requirements.yml
# ラボ動作確認（08-verify-lab.yml）は kubectl exec → docker exec 経由のため追加コレクション不要。
collections:
  - name: kubernetes.core      # k8s / helm モジュール（Calico/MetalLB CR・Clabernetes manager）
    version: ">=5.0.0"
  - name: community.general    # modprobe など
    version: ">=8.0.0"
  - name: ansible.posix        # sysctl など
    version: ">=1.5.0"
